apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - web-deployment.yaml
  - web-service.yaml
  - strapi-configmap.yaml
  - strapi-deployment.yaml
  - strapi-service.yaml
  - strapi-db-service.yaml
  - strapi-db-statefulset.yaml
  - strapi-pvc.yaml
  - matomo-configmap.yaml
  - matomo-pvc.yaml
  - matomo-deployment.yaml
  - matomo-service.yaml
  - matomo-db-service.yaml
  - matomo-db-statefulset.yaml

configMapGenerator:
  - name: wasserball-web-config
    literals:
      - NODE_ENV=production
      - PORT=3000
      - MATOMO_URL=http://matomo
      - MATOMO_SITE_ID=1
      - STRAPI_URL=http://wasserball-strapi:1337
      - STRAPI_PUBLIC_URL=https://wasserball.feuerwehremmerich.de/cms
