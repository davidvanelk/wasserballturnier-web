apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wasserball-prod
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: web=ghcr.io/davidvanelk/wasserball-public-web
    argocd-image-updater.argoproj.io/web.allow-tags: regexp:^latest$
    argocd-image-updater.argoproj.io/web.update-strategy: digest
    argocd-image-updater.argoproj.io/web.kustomize.image-name: ghcr.io/davidvanelk/wasserball-public-web
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: kustomization
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/davidvanelk/wasserballturnier-web.git
    targetRevision: main
    path: gitops/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
