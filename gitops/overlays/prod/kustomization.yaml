apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - web-ingress.yaml
  - web-http-redirect-ingress.yaml
  - web-certificate.yaml
  - strapi-certificate.yaml
  - strapi-ingress.yaml
  - strapi-http-redirect-ingress.yaml
  - strapi-strip-prefix-middleware.yaml
  - matomo-ingress.yaml
  - matomo-http-redirect-ingress.yaml
  - matomo-certificate.yaml
  - traefik-https-redirect-middleware.yaml
  - matomo-basic-auth-middleware.yaml

patches:
  - path: web-scale-patch.yaml
    target:
      kind: Deployment
      name: wasserball-web
