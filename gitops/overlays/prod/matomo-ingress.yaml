apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: matomo
spec:
  ingressClassName: nginx
  rules:
    - host: matomo.wasserball.elk-software.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: matomo
                port:
                  number: 80
