apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasserball-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wasserball.feuerwehremmerich.de
        - wasserball.feuerwehr-elten.de
        - wasserball.elk-software.de
      secretName: wasserball-web-tls
  rules:
    - host: wasserball.feuerwehremmerich.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wasserball-web
                port:
                  number: 80
    - host: wasserball.feuerwehr-elten.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wasserball-web
                port:
                  number: 80
    - host: wasserball.elk-software.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wasserball-web
                port:
                  number: 80
