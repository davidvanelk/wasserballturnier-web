apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasserball-web
  annotations:
    acme.cert-manager.io/http01-ingress-class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: default-traefik-https-redirect@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - wasserball.feuerwehremmerich.de
        - wasserball.feuerwehr-elten.de
        - wasserball.elk-software.de
      secretName: wasserball-web-tls
  rules:
    - host: wasserball.feuerwehremmerich.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wasserball-web
                port:
                  number: 80
    - host: wasserball.feuerwehr-elten.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wasserball-web
                port:
                  number: 80
    - host: wasserball.elk-software.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wasserball-web
                port:
                  number: 80
